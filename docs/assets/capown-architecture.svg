<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CapOwn software architecture</title>
  <desc id="desc">AI agents and the Dashboard connect to a Go Master. Remote Node.js Workers initiate outbound HTTPS connections and execute local MCP plugins over stdio.</desc>
  <defs>
    <pattern id="paper" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#fffdf8"/>
      <path d="M28 0H0V28" fill="none" stroke="#8ba2bd" stroke-opacity=".10" stroke-width="1"/>
    </pattern>
    <filter id="paperNoise" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="2" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="gray"/>
      <feComponentTransfer in="gray" result="faded"><feFuncA type="table" tableValues="0 .035"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="faded" mode="multiply"/>
    </filter>
    <filter id="rough" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="1" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#17233f" flood-opacity=".12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#2858a5"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#197b78"/>
    </marker>
    <style>
      .ink{stroke:#17233f;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#17233f;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
      .zone{font:700 24px 'Segoe Print','Comic Sans MS',sans-serif;letter-spacing:1px;fill:#17233f}
      .label{font:700 21px 'Segoe Print','Comic Sans MS',sans-serif;fill:#17233f}
      .small{font:600 16px 'Segoe Print','Comic Sans MS',sans-serif;fill:#263552}
      .tiny{font:600 14px 'Segoe Print','Comic Sans MS',sans-serif;fill:#40506c}
      .flow{font:700 16px 'Segoe Print','Comic Sans MS',sans-serif;fill:#2858a5}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#paper)" filter="url(#paperNoise)"/>
  <path d="M42 70C220 35 376 64 522 46C691 26 836 58 1007 38C1182 18 1362 55 1554 34" fill="none" stroke="#f1b84b" stroke-opacity=".24" stroke-width="24" stroke-linecap="round"/>
  <text x="800" y="68" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="34" font-weight="800" fill="#17233f">CapOwn</text>

  <g filter="url(#rough)">
    <rect x="42" y="106" width="440" height="654" rx="28" fill="#eaf3ff" fill-opacity=".62" stroke="#2858a5" stroke-opacity=".38" stroke-width="2.5" stroke-dasharray="9 8"/>
    <rect x="554" y="106" width="492" height="654" rx="28" fill="#fff1cc" fill-opacity=".60" stroke="#d48b22" stroke-opacity=".45" stroke-width="2.5" stroke-dasharray="9 8"/>
    <rect x="1118" y="106" width="440" height="654" rx="28" fill="#e7f7f3" fill-opacity=".68" stroke="#197b78" stroke-opacity=".40" stroke-width="2.5" stroke-dasharray="9 8"/>
  </g>

  <text class="zone" x="262" y="145" text-anchor="middle">AGENT AND OPERATOR</text>
  <text class="zone" x="800" y="145" text-anchor="middle">MASTER - Go CONTROL PLANE</text>
  <text class="zone" x="1338" y="145" text-anchor="middle">REMOTE EXECUTION</text>

  <!-- Agent cards -->
  <g filter="url(#shadow)">
    <rect x="88" y="190" width="348" height="124" rx="18" fill="#ffffff" class="ink"/>
    <rect x="88" y="350" width="348" height="124" rx="18" fill="#ffffff" class="ink"/>
    <rect x="88" y="510" width="348" height="156" rx="18" fill="#ffffff" class="ink"/>
  </g>
  <g filter="url(#rough)">
    <rect x="119" y="218" width="88" height="58" rx="7" fill="#dcecff" class="thin"/>
    <path d="M108 286H218L204 296H122Z" fill="#8db8e8" class="thin"/>
    <path d="M138 240L151 252L177 232" fill="none" stroke="#2858a5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text class="label" x="310" y="250" text-anchor="middle">MCP Host</text>
    <text class="tiny" x="310" y="278" text-anchor="middle">AI tool discovery</text>

    <rect x="119" y="379" width="90" height="62" rx="7" fill="#17233f" class="thin"/>
    <path d="M133 398L145 407L133 416M154 418H183" fill="none" stroke="#7de0c7" stroke-width="3" stroke-linecap="round"/>
    <text class="label" x="315" y="410" text-anchor="middle">Python REST Client</text>
    <text class="tiny" x="315" y="438" text-anchor="middle">lightweight HTTP CLI</text>

    <rect x="119" y="538" width="112" height="86" rx="8" fill="#ffffff" class="thin"/>
    <path d="M119 559H231" fill="none" class="thin"/>
    <circle cx="133" cy="549" r="4" fill="#e56858"/><circle cx="147" cy="549" r="4" fill="#f1b84b"/><circle cx="161" cy="549" r="4" fill="#43aa8b"/>
    <path d="M137 579H212M137 593H198M137 607H218" fill="none" stroke="#7c92ae" stroke-width="4" stroke-linecap="round"/>
    <text class="label" x="329" y="570" text-anchor="middle">Dashboard</text>
    <text class="tiny" x="329" y="598" text-anchor="middle">users, Workers, plugins</text>
    <text class="tiny" x="329" y="620" text-anchor="middle">tokens and invitations</text>
  </g>

  <!-- Left-to-master flows -->
  <path d="M436 243C508 243 526 252 592 252" fill="none" stroke="#2858a5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text class="flow" x="515" y="229" text-anchor="middle">MCP / REST</text>
  <path d="M436 412C506 412 528 402 592 402" fill="none" stroke="#2858a5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <path d="M436 563C508 563 528 544 592 544" fill="none" stroke="#2858a5" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text class="flow" x="514" y="527" text-anchor="middle">Web API</text>
  <path d="M592 604C528 604 503 630 438 630" fill="none" stroke="#e56858" stroke-width="3.5" stroke-dasharray="10 9" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="518" y="655" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="16" font-weight="700" fill="#c64f44">SSE events</text>

  <!-- Master -->
  <g filter="url(#shadow)">
    <path d="M637 225L800 178L963 225V542C918 597 863 626 800 654C737 626 682 597 637 542Z" fill="#fff9e9" class="ink"/>
  </g>
  <g filter="url(#rough)">
    <path d="M674 247H926V317H674Z" fill="#3157a8" fill-opacity=".14" class="thin"/>
    <circle cx="704" cy="282" r="15" fill="#3157a8" fill-opacity=".25" class="thin"/>
    <path d="M698 282L704 288L715 273" fill="none" stroke="#2858a5" stroke-width="3.5" stroke-linecap="round"/>
    <text class="small" x="813" y="288" text-anchor="middle">Auth and Ownership</text>

    <path d="M674 337H926V407H674Z" fill="#f1b84b" fill-opacity=".22" class="thin"/>
    <path d="M691 357H716V382H691ZM698 364H723V389" fill="#fff" class="thin"/>
    <text class="small" x="813" y="380" text-anchor="middle">Task Queue</text>

    <path d="M674 427H926V497H674Z" fill="#e56858" fill-opacity=".14" class="thin"/>
    <path d="M695 449H719V477H695ZM702 443H726V471" fill="#fff" class="thin"/>
    <text class="small" x="813" y="470" text-anchor="middle">Leases and Results</text>
    <text x="800" y="210" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="25" font-weight="800" fill="#17233f">Master</text>

    <ellipse cx="800" cy="552" rx="67" ry="19" fill="#d9e7f7" class="thin"/>
    <path d="M733 552V602C733 613 763 622 800 622C837 622 867 613 867 602V552" fill="#eef5fc" class="thin"/>
    <path d="M733 576C733 587 763 596 800 596C837 596 867 587 867 576" fill="none" class="thin"/>
    <text class="small" x="800" y="582" text-anchor="middle">SQLite</text>
  </g>

  <!-- Workers -->
  <g filter="url(#shadow)">
    <rect x="1152" y="183" width="370" height="153" rx="18" fill="#ffffff" class="ink"/>
    <rect x="1152" y="367" width="370" height="153" rx="18" fill="#ffffff" class="ink"/>
    <rect x="1152" y="551" width="370" height="153" rx="18" fill="#ffffff" class="ink"/>
  </g>
  <g filter="url(#rough)">
    <rect x="1176" y="211" width="120" height="78" rx="8" fill="#e3f5f0" class="thin"/>
    <path d="M1188 225H1284V273H1188ZM1200 281H1272" fill="none" class="thin"/>
    <text class="small" x="1236" y="253" text-anchor="middle">Worker</text>
    <text class="tiny" x="1236" y="272" text-anchor="middle">Node.js</text>
    <path d="M1305 250H1334" fill="none" stroke="#197b78" stroke-width="3"/>
    <text class="tiny" x="1320" y="241" text-anchor="middle">stdio</text>
    <rect x="1336" y="211" width="160" height="78" rx="10" fill="#d8f1ea" class="thin"/>
    <text class="small" x="1416" y="246" text-anchor="middle">MCP Plugin</text>
    <path d="M1374 263H1392L1399 270H1461V281H1374Z" fill="#f1b84b" fill-opacity=".55" class="thin"/>

    <rect x="1176" y="395" width="120" height="78" rx="8" fill="#e3f5f0" class="thin"/>
    <circle cx="1194" cy="414" r="4" fill="#43aa8b"/><circle cx="1194" cy="430" r="4" fill="#43aa8b"/><circle cx="1194" cy="446" r="4" fill="#43aa8b"/>
    <path d="M1208 414H1280M1208 430H1280M1208 446H1280" fill="none" stroke="#7c92ae" stroke-width="3"/>
    <text class="small" x="1236" y="466" text-anchor="middle">Worker</text>
    <path d="M1305 434H1334" fill="none" stroke="#197b78" stroke-width="3"/>
    <text class="tiny" x="1320" y="425" text-anchor="middle">stdio</text>
    <rect x="1336" y="395" width="160" height="78" rx="10" fill="#d8f1ea" class="thin"/>
    <text class="small" x="1416" y="430" text-anchor="middle">MCP Plugin</text>
    <text class="tiny" x="1416" y="454" text-anchor="middle">local resource</text>

    <rect x="1176" y="579" width="120" height="78" rx="8" fill="#e3f5f0" class="thin"/>
    <path d="M1193 606L1236 589L1279 606V638H1193Z" fill="#ffffff" class="thin"/>
    <text class="small" x="1236" y="632" text-anchor="middle">Worker</text>
    <path d="M1305 618H1334" fill="none" stroke="#197b78" stroke-width="3"/>
    <text class="tiny" x="1320" y="609" text-anchor="middle">stdio</text>
    <rect x="1336" y="579" width="160" height="78" rx="10" fill="#d8f1ea" class="thin"/>
    <text class="small" x="1416" y="614" text-anchor="middle">MCP Plugin</text>
    <text class="tiny" x="1416" y="638" text-anchor="middle">local workspace</text>
  </g>

  <!-- Outbound worker transport -->
  <path d="M1152 260C1097 260 1073 282 1006 282" fill="none" stroke="#197b78" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <path d="M1152 444C1090 444 1073 424 1006 424" fill="none" stroke="#197b78" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <path d="M1152 628C1090 628 1072 566 1006 566" fill="none" stroke="#197b78" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowTeal)"/>
  <rect x="991" y="329" width="160" height="66" rx="14" fill="#fffdf8" stroke="#197b78" stroke-width="2"/>
  <text x="1071" y="351" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="14" font-weight="700" fill="#197b78">HTTPS: heartbeat</text>
  <text x="1071" y="373" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="14" font-weight="700" fill="#197b78">claim - result</text>
  <path d="M1060 205V184C1060 164 1090 164 1090 184V205" fill="none" class="thin"/>
  <rect x="1051" y="202" width="48" height="42" rx="8" fill="#fff1cc" class="thin"/>
  <circle cx="1075" cy="220" r="5" fill="#d48b22"/>
  <path d="M1075 225V234" class="thin"/>
  <text class="tiny" x="1075" y="264" text-anchor="middle">Ed25519</text>

  <!-- Bottom band -->
  <path d="M100 805C356 782 518 819 800 798C1072 778 1284 816 1500 790" fill="none" stroke="#f1b84b" stroke-width="42" stroke-opacity=".28" stroke-linecap="round"/>
  <text x="800" y="818" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="21" font-weight="800" fill="#17233f">Self-hosted control plane   |   Workers need no inbound port   |   Execution stays on Worker</text>
  <text x="800" y="858" text-anchor="middle" font-family="Segoe Print, Comic Sans MS, sans-serif" font-size="14" font-weight="600" fill="#6c7890">Solid lines: authenticated requests and results   ·   Dashed line: Dashboard event stream</text>
</svg>
